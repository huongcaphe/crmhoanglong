<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản Lý Doanh Thu</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Tahoma;
background:#f2f4f8;
}

header{
background:linear-gradient(90deg,#0b3c73,#124d99);
color:white;
padding:18px;
font-size:26px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.month-bar{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.month-bar input{
padding:8px 12px;
font-size:16px;
border:2px solid #0b3c73;
border-radius:6px;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#0b3c73;
color:white;
}

button:hover{opacity:0.85}

.summary{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:20px;
font-size:18px;
}

.summary span{
font-size:24px;
font-weight:bold;
color:#e67e22;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{
background:#f0f4ff;
}

.money{
text-align:right;
}

.negative{
color:red;
font-weight:bold;
}

.profit{
text-align:right;
font-weight:bold;
}

tfoot td{
background:#ffe082;
font-weight:bold;
}

.lock{
color:red;
font-weight:bold;
margin-left:15px;
}
</style>
</head>

<body>

<header>
QUẢN LÝ DOANH THU
</header>

<div class="container">

<div class="month-bar">
<button onclick="prevMonth()">◀</button>
<input type="month" id="monthPicker">
<button onclick="nextMonth()">▶</button>
<span id="lockStatus" class="lock"></span>
</div>

<div class="summary">
TỔNG DOANH THU: <span id="tongThuTop">0</span> VNĐ
</div>

<button onclick="themDong()">+ Thêm dòng</button>
<button onclick="luuThang()">💾 Lưu</button>
<button onclick="khoaThang()">🔒 Khóa tháng</button>

<br><br>

<table>
<thead>
<tr>
<th>Ngày</th>
<th>Khách hàng</th>
<th>Cước VC</th>
<th>KH kè thêm</th>
<th>Hạ rỗng</th>
<th>Cước công</th>
<th>Thu tiền</th>
<th>XHD</th>
<th>Lợi nhuận</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
<td colspan="6">TỔNG</td>
<td id="tongThu">0</td>
<td></td>
<td id="tongLoiNhuan">0</td>
<td></td>
</tr>
</tfoot>
</table>

</div>

<script>

const monthPicker=document.getElementById("monthPicker");
const tbody=document.getElementById("tbody");
const tongThu=document.getElementById("tongThu");
const tongThuTop=document.getElementById("tongThuTop");
const tongLoiNhuan=document.getElementById("tongLoiNhuan");
const lockStatus=document.getElementById("lockStatus");

function formatMoney(val){
if(!val) return "";
return Number(val).toLocaleString("en-US");
}

function unformatMoney(val){
return Number(val.replace(/,/g,""))||0;
}

function themDong(data={}){
let tr=document.createElement("tr");
tr.innerHTML=`
<td><input type="date" value="${data.ngay||""}"></td>
<td><input value="${data.kh||""}"></td>
<td><input class="money cost" value="${formatMoney(data.cuoc)}"></td>
<td><input class="money cost" value="${formatMoney(data.ke)}"></td>
<td><input class="money cost" value="${formatMoney(data.ha)}"></td>
<td><input class="money cost" value="${formatMoney(data.cong)}"></td>
<td><input class="money thu" value="${formatMoney(data.thu)}"></td>
<td><input class="money" value="${formatMoney(data.xhd)}"></td>
<td class="profit">0</td>
<td><button onclick="xoaDong(this)">X</button></td>
`;
tbody.appendChild(tr);
updateRowProfit(tr);
}

function xoaDong(btn){
btn.closest("tr").remove();
calcTong();
}

document.addEventListener("input",function(e){
if(e.target.classList.contains("money")){
let value=e.target.value.replace(/,/g,"").replace(/\D/g,"");
e.target.value=value?Number(value).toLocaleString("en-US"):"";
updateRowProfit(e.target.closest("tr"));
calcTong();
}
});

function updateRowProfit(tr){
let inputs=tr.querySelectorAll("input");
let cuoc=unformatMoney(inputs[2].value);
let ke=unformatMoney(inputs[3].value);
let ha=unformatMoney(inputs[4].value);
let cong=unformatMoney(inputs[5].value);
let thu=unformatMoney(inputs[6].value);

let profit=thu-(cuoc+ke+ha+cong);

let profitCell=tr.querySelector(".profit");
profitCell.innerText=profit.toLocaleString("en-US");

if(profit<0){
profitCell.classList.add("negative");
}else{
profitCell.classList.remove("negative");
}
}

function calcTong(){
let sumThu=0;
let sumProfit=0;

document.querySelectorAll("#tbody tr").forEach(tr=>{
let thu=unformatMoney(tr.querySelector(".thu")?.value||"0");
sumThu+=thu;

let profit=Number(tr.querySelector(".profit")?.innerText.replace(/,/g,"")||0);
sumProfit+=profit;
});

tongThu.innerText=sumThu.toLocaleString("en-US");
tongThuTop.innerText=sumThu.toLocaleString("en-US");
tongLoiNhuan.innerText=sumProfit.toLocaleString("en-US");
}

function luuThang(){
let data=[];
document.querySelectorAll("#tbody tr").forEach(tr=>{
let i=tr.querySelectorAll("input");
data.push({
ngay:i[0].value,
kh:i[1].value,
cuoc:unformatMoney(i[2].value),
ke:unformatMoney(i[3].value),
ha:unformatMoney(i[4].value),
cong:unformatMoney(i[5].value),
thu:unformatMoney(i[6].value),
xhd:unformatMoney(i[7].value)
});
});
localStorage.setItem("data_"+monthPicker.value,JSON.stringify(data));
alert("Đã lưu!");
}

function taiThang(){
tbody.innerHTML="";
let data=JSON.parse(localStorage.getItem("data_"+monthPicker.value)||"[]");
data.forEach(d=>themDong(d));
calcTong();

if(localStorage.getItem("lock_"+monthPicker.value)){
lockStatus.innerText="🔒 ĐÃ KHÓA";
}else{
lockStatus.innerText="";
}
}

function khoaThang(){
localStorage.setItem("lock_"+monthPicker.value,true);
lockStatus.innerText="🔒 ĐÃ KHÓA";
}

function prevMonth(){
let d=new Date(monthPicker.value+"-01");
d.setMonth(d.getMonth()-1);
monthPicker.value=d.toISOString().slice(0,7);
taiThang();
}

function nextMonth(){
let d=new Date(monthPicker.value+"-01");
d.setMonth(d.getMonth()+1);
monthPicker.value=d.toISOString().slice(0,7);
taiThang();
}

monthPicker.onchange=taiThang;

window.onload=()=>{
const now=new Date();
monthPicker.value=now.toISOString().slice(0,7);
taiThang();
};

</script>

</body>
</html>
