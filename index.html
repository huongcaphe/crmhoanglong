<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Doanh Thu</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}
header{
    background:linear-gradient(90deg,#0f2f5f,#1f4c8f);
    color:white;
    padding:15px 25px;
    font-size:22px;
    display:flex;
    justify-content:space-between;
}
.container{ padding:20px; }

button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:500;
}
.btn-primary{background:#1f4c8f;color:white;}
.btn-danger{background:#d9534f;color:white;}
.btn-warning{background:#f0ad4e;color:white;}
.btn-success{background:#28a745;color:white;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    background:white;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
th{ background:#e9ecef; }

.total-box{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:8px;
    font-size:22px;
}
.total-box span{
    color:#e67e22;
    font-weight:bold;
    font-size:26px;
}
input{
    width:100%;
    padding:6px;
    box-sizing:border-box;
}
.login-box{
    max-width:320px;
    margin:120px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}
.hidden{display:none;}

.month-box{
    font-size:20px;
    padding:6px;
    margin:10px 0;
}
.log-box{
    background:white;
    padding:15px;
    margin-top:20px;
    border-radius:8px;
}
canvas{
    background:white;
    margin-top:20px;
    padding:15px;
    border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
    <h3>Đăng nhập Admin</h3>
    <input type="text" id="username" placeholder="Tên đăng nhập"><br><br>
    <input type="password" id="password" placeholder="Mật khẩu"><br><br>
    <button class="btn-primary" onclick="login()">Đăng nhập</button>
</div>

<!-- MAIN -->
<div id="mainPage" class="hidden">

<header>
    <div>QUẢN LÝ DOANH THU</div>
    <button class="btn-danger" onclick="logout()">Đăng xuất</button>
</header>

<div class="container">

<input type="month" id="monthPicker" class="month-box" onchange="loadData()">

<div class="total-box">
TỔNG DOANH THU: <span id="totalRevenue">0</span> VNĐ
</div>

<br>
<button class="btn-success" onclick="addRow()">+ Thêm dòng</button>
<button class="btn-primary" onclick="saveData()">Lưu</button>
<button class="btn-warning" onclick="lockMonth()">Khóa tháng</button>
<button class="btn-primary" onclick="exportExcel()">Xuất Excel</button>

<table id="dataTable">
<thead>
<tr>
<th>Ngày</th>
<th>Khách hàng</th>
<th>Cước VC</th>
<th>KH kè thêm</th>
<th>Hạ rỗng</th>
<th>Cước công</th>
<th>Thu tiền</th>
<th>XHD</th>
<th>Xóa</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- BIỂU ĐỒ -->
<canvas id="revenueChart" height="100"></canvas>

<!-- NHẬT KÝ -->
<div class="log-box">
<h3>Nhật ký tháng</h3>
<ul id="monthLog"></ul>
</div>

</div>
</div>

<script>

let chart;
const ADMIN_USER="admin";
const ADMIN_PASS="vthoanglong";

function login(){
    if(username.value===ADMIN_USER && password.value===ADMIN_PASS){
        loginPage.classList.add("hidden");
        mainPage.classList.remove("hidden");
        monthPicker.value=new Date().toISOString().slice(0,7);
        loadData();
    }else{
        alert("Sai tài khoản hoặc mật khẩu");
    }
}

function logout(){
    location.reload();
}

function formatMoney(input){
    let value=input.value.replace(/\D/g,'');
    input.value=Number(value).toLocaleString();
    calculateTotal();
}

function addRow(data={}){
    const tbody=document.querySelector("#dataTable tbody");
    let row=tbody.insertRow();

    row.innerHTML=`
    <td><input type="date" value="${data.date||''}"></td>
    <td><input value="${data.customer||''}"></td>
    <td><input oninput="formatMoney(this)" value="${data.vc||''}"></td>
    <td><input oninput="formatMoney(this)" value="${data.extra||''}"></td>
    <td><input oninput="formatMoney(this)" value="${data.empty||''}"></td>
    <td><input oninput="formatMoney(this)" value="${data.labour||''}"></td>
    <td><input oninput="formatMoney(this)" value="${data.pay||''}"></td>
    <td><input value="${data.xhd||''}"></td>
    <td><button class="btn-danger" onclick="this.closest('tr').remove();calculateTotal();">X</button></td>
    `;
}

function calculateTotal(){
    let total=0;
    document.querySelectorAll("#dataTable tbody tr").forEach(row=>{
        let val=row.cells[6].querySelector("input").value.replace(/,/g,'');
        total+=Number(val)||0;
    });
    totalRevenue.textContent=total.toLocaleString();
    updateChart();
}

function saveData(){
    let data=[];
    document.querySelectorAll("#dataTable tbody tr").forEach(row=>{
        data.push({
            date:row.cells[0].querySelector("input").value,
            customer:row.cells[1].querySelector("input").value,
            vc:row.cells[2].querySelector("input").value,
            extra:row.cells[3].querySelector("input").value,
            empty:row.cells[4].querySelector("input").value,
            labour:row.cells[5].querySelector("input").value,
            pay:row.cells[6].querySelector("input").value,
            xhd:row.cells[7].querySelector("input").value
        });
    });
    localStorage.setItem(monthPicker.value,JSON.stringify(data));
    alert("Đã lưu dữ liệu");
}

function loadData(){
    document.querySelector("#dataTable tbody").innerHTML="";
    let data=JSON.parse(localStorage.getItem(monthPicker.value))||[];
    data.forEach(d=>addRow(d));
    calculateTotal();
    updateLog();
}

function lockMonth(){
    localStorage.setItem("lock_"+monthPicker.value,"true");
    alert("Đã khóa tháng");
}

function exportExcel(){
    let wb=XLSX.utils.book_new();
    let ws_data=[["Ngày","Khách hàng","Cước VC","KH kè thêm","Hạ rỗng","Cước công","Thu tiền","XHD"]];
    document.querySelectorAll("#dataTable tbody tr").forEach(row=>{
        ws_data.push([
            row.cells[0].querySelector("input").value,
            row.cells[1].querySelector("input").value,
            row.cells[2].querySelector("input").value,
            row.cells[3].querySelector("input").value,
            row.cells[4].querySelector("input").value,
            row.cells[5].querySelector("input").value,
            row.cells[6].querySelector("input").value,
            row.cells[7].querySelector("input").value
        ]);
    });
    let ws=XLSX.utils.aoa_to_sheet(ws_data);
    XLSX.utils.book_append_sheet(wb,ws,"DoanhThu");
    XLSX.writeFile(wb,"DoanhThu.xlsx");
}

function updateChart(){
    let labels=[],values=[];
    document.querySelectorAll("#dataTable tbody tr").forEach(row=>{
        labels.push(row.cells[0].querySelector("input").value);
        values.push(Number(row.cells[6].querySelector("input").value.replace(/,/g,''))||0);
    });
    if(chart) chart.destroy();
    chart=new Chart(document.getElementById('revenueChart'),{
        type:'bar',
        data:{labels:labels,datasets:[{label:'Doanh thu',data:values,backgroundColor:'#1f4c8f'}]}
    });
}

function updateLog(){
    let log=document.getElementById("monthLog");
    log.innerHTML="";
    log.innerHTML+="<li>Tháng: "+monthPicker.value+"</li>";
    log.innerHTML+="<li>Tổng doanh thu: "+totalRevenue.textContent+" VNĐ</li>";
}

</script>

</body>
</html>
