<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CRM HOÀNG LONG</title>

<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Times New Roman;background:#f4f4f4}
header{background:#0b3c73;color:white;text-align:center;padding:15px;font-size:26px}
nav{display:flex;background:#ddd}
nav button{flex:1;padding:10px;border:none;font-size:16px;cursor:pointer}
nav button.active{background:#0b3c73;color:white}
.container{padding:20px}
table{width:100%;border-collapse:collapse;background:white}
th,td{border:1px solid #999;padding:4px;text-align:center}
th{background:#ddd}
input{width:100%;border:none;text-align:center}
input:disabled{background:#eee}
tfoot td{background:#f7c934;font-weight:bold}
.actions button{margin:5px;padding:8px 12px}
.hidden{display:none}
.lock{color:red;font-weight:bold;margin-left:10px}
.login-box{
max-width:320px;margin:120px auto;
background:white;padding:20px;border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.1)
}
.login-box h2{text-align:center}
.login-box input{width:100%;padding:8px;margin:6px 0}
.login-box button{width:100%;padding:8px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
<h2>ĐĂNG NHẬP CRM</h2>
<input id="user" placeholder="Tên đăng nhập">
<input id="pass" type="password" placeholder="Mật khẩu">
<button onclick="login()">Đăng nhập</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
CRM HOÀNG LONG
<button style="float:right" onclick="logout()">Đăng xuất</button>
</header>

<nav>
<button id="tabNhap" class="active" onclick="showTab('nhap')">📥 Nhập</button>
<button id="tabNhatKy" onclick="showTab('nhatky')">📚 Nhật ký</button>
<button id="tabChart" onclick="showTab('chart')">📊 Biểu đồ</button>
</nav>

<div class="container">

<!-- NHẬP -->
<div id="nhap">
<h2>
BẢNG KÊ THÁNG:
<input type="month" id="monthPicker">
<span id="lockStatus" class="lock"></span>
</h2>

<table>
<thead>
<tr>
<th>Ngày</th>
<th>Khách hàng</th>
<th>SĐT</th>
<th>Xe</th>
<th>Cước VC</th>
<th>KH kè thêm</th>
<th>Hạ rỗng</th>
<th>Cước công</th>
<th>Thu tiền</th>
<th>XHD</th>
<th>Ghi chú</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
<tfoot>
<tr>
<td colspan="8">TỔNG THU</td>
<td id="tongThu">0</td>
<td colspan="2"></td>
</tr>
</tfoot>
</table>

<div class="actions">
<button onclick="themDong()">➕ Thêm dòng</button>
<button onclick="luuThang()">💾 Lưu tháng</button>
<button onclick="chotThang()">🔒 Chốt tháng</button>
<button onclick="xuatExcel()">📤 Xuất Excel</button>
</div>
</div>

<!-- NHẬT KÝ -->
<div id="nhatky" class="hidden">
<h2>NHẬT KÝ THÁNG</h2>
<ul id="listThang"></ul>
</div>

<!-- BIỂU ĐỒ -->
<div id="chart" class="hidden">
<h2>BIỂU ĐỒ DOANH THU</h2>
<canvas id="chartNgay"></canvas>
<br><br>
<canvas id="chartThang"></canvas>
</div>

</div>
</div>

<script>
/* ========= LOGIN ========= */
function login(){
const u=document.getElementById("user").value.trim();
const p=document.getElementById("pass").value.trim();
if(u==="admin" && p==="vthoanglong"){
localStorage.setItem("LOGIN","admin");
location.reload();
}else alert("Sai tên đăng nhập hoặc mật khẩu");
}
function logout(){
localStorage.removeItem("LOGIN");
location.reload();
}
if(localStorage.getItem("LOGIN")==="admin"){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").classList.remove("hidden");
}

/* ========= TAB ========= */
function showTab(tab){
["nhap","nhatky","chart"].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});
document.getElementById(tab).classList.remove("hidden");
if(tab==="nhatky")loadNhatKy();
if(tab==="chart")loadChart();
}

/* ========= DATA ========= */
const tbody=document.getElementById("tbody");
const monthPicker=document.getElementById("monthPicker");
const tongThuEl=document.getElementById("tongThu");
const lockStatus=document.getElementById("lockStatus");

function themDong(d={}){
const tr=document.createElement("tr");
tr.innerHTML=`
<td><input type="date" value="${d.ngay||''}"></td>
<td><input value="${d.kh||''}"></td>
<td><input value="${d.dt||''}"></td>
<td><input value="${d.xe||''}"></td>
<td><input value="${d.cuoc||0}"></td>
<td><input value="${d.ke||0}"></td>
<td><input value="${d.ha||0}"></td>
<td><input value="${d.cong||0}"></td>
<td><input class="thu" value="${d.thu||0}"></td>
<td><input value="${d.xhd||0}"></td>
<td><input value="${d.note||''}"></td>`;
tbody.appendChild(tr);
tr.querySelector(".thu").oninput=calcTong;
calcTong();
}

function calcTong(){
let sum=0;
document.querySelectorAll(".thu").forEach(i=>sum+=Number(i.value||0));
tongThuEl.innerText=sum.toLocaleString();
}

function luuThang(){
if(!monthPicker.value)return alert("Chọn tháng");
const arr=[];
tbody.querySelectorAll("tr").forEach(tr=>{
const i=tr.querySelectorAll("input");
arr.push({
ngay:i[0].value,kh:i[1].value,dt:i[2].value,xe:i[3].value,
cuoc:i[4].value,ke:i[5].value,ha:i[6].value,cong:i[7].value,
thu:i[8].value,xhd:i[9].value,note:i[10].value
});
});
localStorage.setItem("DATA_"+monthPicker.value,JSON.stringify(arr));
alert("Đã lưu tháng "+monthPicker.value);
}

function taiThang(m){
tbody.innerHTML="";
(JSON.parse(localStorage.getItem("DATA_"+m)||"[]")).forEach(d=>themDong(d));
const locked=localStorage.getItem("LOCK_"+m);
lockStatus.innerText=locked?"🔒 THÁNG ĐÃ CHỐT":"";
tbody.querySelectorAll("input").forEach(i=>i.disabled=locked);
calcTong();
}

function chotThang(){
if(!monthPicker.value)return alert("Chọn tháng");
if(!confirm("Chốt tháng sẽ khóa và không sửa được. Tiếp tục?"))return;
luuThang();
localStorage.setItem("LOCK_"+monthPicker.value,"1");
taiThang(monthPicker.value);
}

monthPicker.onchange=()=>taiThang(monthPicker.value);

/* ========= NHẬT KÝ ========= */
function loadNhatKy(){
listThang.innerHTML="";
Object.keys(localStorage).forEach(k=>{
if(k.startsWith("DATA_")){
const m=k.replace("DATA_","");
listThang.innerHTML+=`<li><a href="#" onclick="monthPicker.value='${m}';showTab('nhap');taiThang('${m}')">${m}</a></li>`;
}});
}

/* ========= EXCEL ========= */
function xuatExcel(){
if(!monthPicker.value)return;
const wb=XLSX.utils.book_new();
const ws=[["Ngày","Khách","SĐT","Xe","VC","Kè","Hạ","Công","Thu","XHD","Ghi chú"]];
tbody.querySelectorAll("tr").forEach(tr=>{
ws.push([...tr.querySelectorAll("input")].map(i=>i.value));
});
XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws),"DATA");
XLSX.writeFile(wb,"CRM_HOANG_LONG_"+monthPicker.value+".xlsx");
}

/* ========= CHART ========= */
let chart1,chart2;
function loadChart(){
const byDay={},byMonth={};
Object.keys(localStorage).forEach(k=>{
if(k.startsWith("DATA_")){
const m=k.replace("DATA_","");
let total=0;
JSON.parse(localStorage.getItem(k)).forEach(d=>{
total+=Number(d.thu||0);
if(d.ngay)byDay[d.ngay]=(byDay[d.ngay]||0)+Number(d.thu||0);
});
byMonth[m]=total;
}});
if(chart1)chart1.destroy();
if(chart2)chart2.destroy();
chart1=new Chart(chartNgay,{type:"bar",
data:{labels:Object.keys(byDay),datasets:[{label:"Theo ngày",data:Object.values(byDay)}]}});
chart2=new Chart(chartThang,{type:"line",
data:{labels:Object.keys(byMonth),datasets:[{label:"Theo tháng",data:Object.values(byMonth)}]}});
}
</script>

</body>
</html>
